# monitoring/alert-rules.yml
# Alerting rules evaluated by Prometheus every `evaluation_interval` (15s).
# Severity levels: page (wake someone up) | warn (look at during business hours).

groups:
  - name: stellar-indigopay-backend-http
    interval: 30s
    rules:
      - alert: BackendHigh5xxRate
        expr: |
          sum(rate(http_requests_total{job="stellar-indigopay-backend",status_code=~"5.."}[5m]))
            /
          sum(rate(http_requests_total{job="stellar-indigopay-backend"}[5m]))
            > 0.05
        for: 5m
        labels:
          severity: page
        annotations:
          summary: "Backend 5xx rate above 5% for 5m"
          description: |
            More than 5% of HTTP responses in the last 5 minutes returned 5xx.
            Check Sentry and the readiness endpoint.

      - alert: BackendHighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum by (route) (rate(http_request_duration_seconds_bucket{job="stellar-indigopay-backend"}[5m]))
          ) > 2
        for: 10m
        labels:
          severity: warn
        annotations:
          summary: "Backend p99 latency above 2s for 10m on {{ $labels.route }}"

  - name: stellar-indigopay-backend-database
    interval: 30s
    rules:
      - alert: DbPoolExhausted
        expr: db_pool_waiting_count{job="stellar-indigopay-backend"} > 5
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "Postgres pool has > 5 waiting clients for 2m"
          description: "Consider raising DB_POOL_MAX or investigating slow queries."

      - alert: DbQuerySlow
        expr: |
          histogram_quantile(0.99,
            sum by (operation) (rate(db_query_duration_seconds_bucket{job="stellar-indigopay-backend"}[5m]))
          ) > 0.5
        for: 10m
        labels:
          severity: warn
        annotations:
          summary: "Postgres p99 query latency above 500ms for 10m on op={{ $labels.operation }}"

  - name: stellar-indigopay-backend-readiness
    interval: 30s
    rules:
      - alert: ReadinessProbeFailing
        # We can't directly scrape /api/readyz, so this rule fires when the
        # in-process readiness_log metric indicates a failure. The wrapper
        # increments readiness_check_failed_total when /api/readyz returns 503.
        expr: increase(readiness_check_failed_total{job="stellar-indigopay-backend"}[5m]) > 0
        for: 3m
        labels:
          severity: page
        annotations:
          summary: "Backend readiness has been failing for 3m"

  - name: stellar-indigopay-postgres-replication
    interval: 30s
    rules:
      - alert: PgReplicationLag
        # Fires when replication lag exceeds 60s (1 min). The DR plan
        # targets RPO < 1 min, so any lag beyond that is actionable.
        # Requires postgres_exporter (see k8s/postgres-exporter.yaml).
        # Metric name: pg_stat_replication_flush_lag_seconds (postgres_exporter ≥0.15)
        # If using an older exporter, the metric may be pg_stat_replication_flush_lag
        # (raw bytes from pg_wal_lsn_diff — adjust threshold accordingly).
        expr: |
          pg_stat_replication_flush_lag_seconds{application_name="standby"} > 60
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "PostgreSQL replication lag is > 60s for 2m"
          description: |
            The warm standby is falling behind the primary. If the primary
            fails now, up to {{ $value }}s of data may be lost.
            Check network connectivity between primary and standby regions.

      - alert: PgReplicationSlotBehind
        # Fires when the replication slot has accumulated > 1GB of pending
        # WAL. This typically means the standby is disconnected or too slow.
        expr: |
          pg_replication_slots_retained_bytes{slot_name="standby_slot"} > 1e9
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "Replication slot 'standby_slot' has > 1GB pending WAL"
          description: |
            The standby is not consuming WAL fast enough. If this persists,
            the primary may run out of disk space from retained WAL.

      - alert: PgReplicationDown
        # Fires when no replication metrics are reported for the standby.
        # postgres_exporter exports pg_stat_replication as a gauge with
        # application_name as a label. absent() returns 1 if the metric
        # has no data points.
        expr: |
          absent(pg_stat_replication{application_name="standby"})
        for: 2m
        labels:
          severity: page
        annotations:
          summary: "No active PostgreSQL replication connections from standby"
          description: |
            The standby is not connected to the primary. Streaming
            replication is down. Failover is not possible until restored.

      - alert: PgStandbyNotReady
        # The standby pod is not passing readiness checks. Requires
        # kube-state-metrics to be deployed in the cluster.
        expr: |
          kube_pod_status_ready{namespace="stellar-indigopay",pod=~"postgres-standby-.*"} == 0
        for: 5m
        labels:
          severity: warn
        annotations:
          summary: "PostgreSQL standby pod is not ready for 5m"
          description: |
            The warm standby is not healthy. Streaming replication
            may be interrupted.
